command:
  - "python"
  - "-m"
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  # Foundation Model endpoint for routing decisions
  - name: MODEL_ENDPOINT
    value: databricks-claude-sonnet-4-5

  # Unity Catalog settings
  - name: UC_CATALOG
    value: main

  - name: UC_SCHEMA
    value: agents
